<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>Auto-loop with sound notification</title>
    <style>
        * {
            box-sizing: border-box;
            user-select: none; /* 避免按钮文字被选中，提升操作感 */
        }

        body {
            background: linear-gradient(145deg, #1a2a3a 0%, #0f1a24 100%);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            font-family: 'Segoe UI', 'Poppins', 'Roboto', system-ui, -apple-system, 'Inter', sans-serif;
            margin: 0;
            padding: 20px;
        }

        /* 主卡片 */
        .timer-card {
            background: rgba(22, 34, 48, 0.75);
            backdrop-filter: blur(12px);
            border-radius: 64px;
            box-shadow: 0 25px 45px rgba(0, 0, 0, 0.5), inset 0 1px 1px rgba(255, 255, 255, 0.1);
            padding: 2rem 2rem 2.5rem;
            width: 100%;
            max-width: 600px;
            transition: all 0.2s ease;
            border: 1px solid rgba(255, 255, 255, 0.2);
        }

        /* 时间显示器 */
        .time-display {
            background: #0b1219;
            border-radius: 72px;
            padding: 0.6rem 0.8rem;
            margin-bottom: 2rem;
            box-shadow: inset 0 5px 12px rgba(0, 0, 0, 0.5), 0 6px 12px rgba(0, 0, 0, 0.2);
            border: 1px solid #2c3e44;
        }

        #timer {
            font-size: clamp(3.5rem, 15vw, 7rem);
            font-weight: 800;
            font-family: 'Fira Mono', 'JetBrains Mono', monospace;
            text-align: center;
            letter-spacing: 6px;
            color: #e3f2fd;
            background: linear-gradient(135deg, #eef9ff, #c4e2ff);
            background-clip: text;
            -webkit-background-clip: text;
            color: transparent;
            text-shadow: 0 2px 5px rgba(0, 0, 0, 0.2);
            word-break: break-word;
        }

        /* 时间微调区域 +/- 1分钟 */
        .adjust-panel {
            display: flex;
            justify-content: center;
            gap: 1.8rem;
            margin-bottom: 2rem;
            flex-wrap: wrap;
        }

        .adj-btn {
            background: #1e2f3c;
            border: none;
            font-size: 2rem;
            font-weight: bold;
            width: 70px;
            height: 70px;
            border-radius: 60px;
            color: white;
            cursor: pointer;
            transition: 0.15s linear;
            box-shadow: 0 6px 0 #0a1219;
            font-family: monospace;
            display: inline-flex;
            align-items: center;
            justify-content: center;
            backdrop-filter: blur(4px);
            background: #2a3f4b;
        }

        .adj-btn:active {
            transform: translateY(3px);
            box-shadow: 0 2px 0 #0a1219;
        }

        .adj-btn span {
            font-size: 2rem;
            font-weight: 800;
        }

        /* 主控制按钮组 */
        .action-buttons {
            display: flex;
            justify-content: center;
            gap: 1.2rem;
            margin-bottom: 2rem;
            flex-wrap: wrap;
        }

        .ctrl-btn {
            background: #263b44;
            border: none;
            font-size: 1.25rem;
            font-weight: 600;
            padding: 12px 28px;
            border-radius: 50px;
            color: #f0fcff;
            cursor: pointer;
            transition: all 0.15s;
            box-shadow: 0 4px 8px rgba(0, 0, 0, 0.3);
            font-family: inherit;
            letter-spacing: 1px;
            backdrop-filter: blur(4px);
        }

        .ctrl-btn:active {
            transform: scale(0.96);
        }

        .reset-btn {
            background: #2c484e;
            border-bottom: 3px solid #4e7b86;
        }

        .start-btn {
            background: #1e6b5e;
            border-bottom: 3px solid #2baa96;
            box-shadow: 0 4px 12px rgba(0, 180, 140, 0.3);
        }

        .pause-btn {
            background: #5d3a1a;
            border-bottom: 3px solid #b87c2e;
        }

        /* 状态辅助信息 */
        .status-area {
            display: flex;
            justify-content: center;
            align-items: baseline;
            gap: 1rem;
            font-size: 0.9rem;
            background: #0b1820b3;
            border-radius: 60px;
            padding: 10px 18px;
            width: fit-content;
            margin: 0 auto 0.5rem auto;
            color: #bdd4de;
        }

        .auto-badge {
            background: #1e5f48;
            padding: 4px 12px;
            border-radius: 40px;
            font-weight: 500;
            font-size: 0.8rem;
            color: #c6ffea;
        }

        .mode-tip {
            font-weight: 400;
        }
        
        /* 音量控制区域 - 字体颜色强制白色 */
        .volume-control {
            display: flex;
            justify-content: center;
            align-items: center;
            gap: 12px;
            margin-top: 18px;
            margin-bottom: 8px;
            padding: 8px 12px;
            background: rgba(0, 0, 0, 0.2);
            border-radius: 48px;
            width: fit-content;
            margin-left: auto;
            margin-right: auto;
        }
        
        .volume-label {
            color: #ffffff !important;   /* 强制白色 */
            font-size: 0.95rem;
            font-weight: 500;
            letter-spacing: 0.5px;
        }
        
        .volume-value {
            color: #ffffff !important;   /* 强制白色 */
            font-size: 0.9rem;
            font-weight: 500;
            min-width: 48px;
            background: rgba(0,0,0,0.4);
            padding: 2px 8px;
            border-radius: 30px;
            text-align: center;
        }
        
        /* 自定义滑块样式 - 确保可拖动且美观 */
        .volume-slider {
            width: 160px;
            height: 4px;
            -webkit-appearance: none;
            background: #2c4a5e;
            border-radius: 5px;
            outline: none;
            cursor: pointer;
        }
        
        .volume-slider:focus {
            outline: none;
        }
        
        .volume-slider::-webkit-slider-runnable-track {
            width: 100%;
            height: 4px;
            background: #2c4a5e;
            border-radius: 5px;
        }
        
        .volume-slider::-webkit-slider-thumb {
            -webkit-appearance: none;
            width: 18px;
            height: 18px;
            background: #5bc0be;
            border-radius: 50%;
            cursor: pointer;
            margin-top: -7px;
            box-shadow: 0 1px 4px rgba(0,0,0,0.4);
            border: none;
        }
        
        .volume-slider::-moz-range-track {
            height: 4px;
            background: #2c4a5e;
            border-radius: 5px;
        }
        
        .volume-slider::-moz-range-thumb {
            width: 18px;
            height: 18px;
            background: #5bc0be;
            border-radius: 50%;
            cursor: pointer;
            border: none;
        }
        
        .volume-slider::-ms-track {
            width: 100%;
            height: 4px;
            background: transparent;
            border-color: transparent;
            color: transparent;
        }

        footer {
            text-align: center;
            font-size: 0.7rem;
            color: #6c8d9c;
            margin-top: 1.2rem;
        }
        
        @media (max-width: 480px) {
            .timer-card {
                padding: 1.5rem;
            }
            .adj-btn {
                width: 58px;
                height: 58px;
                font-size: 1.6rem;
            }
            .ctrl-btn {
                padding: 8px 18px;
                font-size: 1rem;
            }
            .volume-slider {
                width: 130px;
            }
        }
    </style>
</head>
<body>

<div class="timer-card">
    <div class="time-display">
        <div id="timer">10:00</div>
    </div>

    <div class="adjust-panel">
        <button class="adj-btn" id="minusBtn" aria-label="减少一分钟">–</button>
        <button class="adj-btn" id="plusBtn" aria-label="增加一分钟">+</button>
    </div>

    <div class="action-buttons">
        <button class="ctrl-btn start-btn" id="startBtn">▶ Start</button>
        <button class="ctrl-btn pause-btn" id="pauseBtn">⏸ Pause</button>
        <button class="ctrl-btn reset-btn" id="resetBtn">⟳ Reset</button>
    </div>

    
    <!-- 音量控制器 - 字体白色 -->
    <div class="volume-control">
        <span class="volume-label">🔊 Volume</span>
        <input type="range" id="volumeSlider" class="volume-slider" min="0" max="1" step="0.01" value="0.75">
        <span id="volumeValue" class="volume-value">75%</span>
    </div>
    
    
</div>

<script>
    (function() {
        // ---------- DOM 元素 ----------
        const timerElement = document.getElementById('timer');
        const minusBtn = document.getElementById('minusBtn');
        const plusBtn = document.getElementById('plusBtn');
        const startBtn = document.getElementById('startBtn');
        const pauseBtn = document.getElementById('pauseBtn');
        const resetBtn = document.getElementById('resetBtn');
        const volumeSlider = document.getElementById('volumeSlider');
        const volumeValueSpan = document.getElementById('volumeValue');

        // ---------- 核心变量 (基于时间戳精准倒计时) ----------
        let initialMinutes = 10;            // 基准分钟数 (用户通过 +/- 调节)
        let initialTotalSeconds = 600;      // 初始总秒数 (分钟*60)
        let remainingSeconds = 600;         // 当前剩余秒数 (用于显示及重置)
        
        let timerInterval = null;            // 定时器句柄 (高频刷新界面)
        let isRunning = false;               // 倒计时是否激活
        
        // 基于时间戳倒计时的关键变量
        let endTimestamp = null;              // 预期结束的绝对时间戳 (毫秒)
        
        // 全局音量 (0~1)
        let globalVolume = 0.75;
        
        // 音频上下文 (懒加载 + 自动恢复)
        let audioCtx = null;
        
        // ---------- 辅助函数: 格式化显示 mm:ss ----------
        function updateDisplayBySeconds(totalSeconds) {
            if (totalSeconds < 0) totalSeconds = 0;
            const mins = Math.floor(totalSeconds / 60);
            const secs = totalSeconds % 60;
            timerElement.innerText = `${mins.toString().padStart(2, '0')}:${secs.toString().padStart(2, '0')}`;
        }
        
        // 刷新UI (基于当前剩余秒数)
        function refreshDisplay() {
            updateDisplayBySeconds(remainingSeconds);
        }
        
        // 停止计时器 (清空 interval, 取消运行标志)
        function stopTimer() {
            if (timerInterval) {
                clearInterval(timerInterval);
                timerInterval = null;
            }
            isRunning = false;
            endTimestamp = null;
        }
        
        // 核心倒计时启动 (基于绝对结束时间戳)
        // 参数: 起始剩余秒数 startRemaining (用于设定结束时刻)
        function startAccurateCountdown(startRemainingSeconds) {
            if (isRunning) return;
            if (startRemainingSeconds <= 0) {
                // 若剩余时间 <=0, 直接触发完成逻辑 (重置并自动播放)
                handleTimerComplete();
                return;
            }
            
            // 记录剩余秒数
            remainingSeconds = startRemainingSeconds;
            // 计算结束时间戳 (当前时间 + 剩余毫秒数)
            const now = Date.now();
            endTimestamp = now + (remainingSeconds * 1000);
            
            isRunning = true;
            
            // 清除之前的定时器，防止冲突
            if (timerInterval) clearInterval(timerInterval);
            
            // 使用高频率定时器 (250ms) 来检查时间差值，保证界面流畅且后台恢复后瞬间校准
            timerInterval = setInterval(() => {
                if (!isRunning) return;
                
                const nowMs = Date.now();
                let diffSeconds = (endTimestamp - nowMs) / 1000;
                
                if (diffSeconds <= 0) {
                    // 倒计时结束
                    stopTimer();                // 清除定时器，置端标志
                    handleTimerComplete();      // 播放声音 + 重置整个倒计时 (自动重新开始)
                    return;
                }
                
                // 更新剩余秒数 (向上取整保证界面不出现 -0 秒, 但实际逻辑严密)
                const newRemaining = Math.ceil(diffSeconds);
                if (remainingSeconds !== newRemaining) {
                    remainingSeconds = newRemaining;
                    updateDisplayBySeconds(remainingSeconds);
                } else {
                    // 即使数值没变，保证极端情况下显示正确 (例如刚启动)
                    updateDisplayBySeconds(remainingSeconds);
                }
            }, 200); // 200ms 刷新足够实时且性能友好
        }
        
        // ---------- 处理倒计时结束 (完成音效 + 重置时间 + 自动重开) ----------
        function handleTimerComplete() {
            // 确保显示 0:00
            remainingSeconds = 0;
            updateDisplayBySeconds(0);
            
            // 1. 播放叮咚声音
            playDingDong();
            
            // 2. 重置剩余时间 = 初始设定的总秒数
            const newTotalSec = initialMinutes * 60;
            remainingSeconds = newTotalSec;
            updateDisplayBySeconds(remainingSeconds);
            
            // 3. 自动重新开始倒计时 (基于最新的剩余时间)
            //   注意: 此时 isRunning = false, 直接调用开始函数即可
            startAccurateCountdown(remainingSeconds);
        }
        
        // ---------- 重置功能 (停止计时，重置时间为初始分钟，不自动开始) ----------
        function resetTimer() {
            stopTimer();                        // 停止并置 isRunning = false
            remainingSeconds = initialMinutes * 60;
            updateDisplayBySeconds(remainingSeconds);
        }
        
        // ---------- 开始计时 (若已运行则忽略，否则基于当前剩余秒数启动) ----------
        function startTimer() {
            if (isRunning) return;
            // 如果剩余秒数 <= 0, 重置为初始值 (保障开始的时候有正数)
            if (remainingSeconds <= 0) {
                remainingSeconds = initialMinutes * 60;
                updateDisplayBySeconds(remainingSeconds);
            }
            startAccurateCountdown(remainingSeconds);
        }
        
        // ---------- 暂停计时 ----------
        function pauseTimer() {
            if (!isRunning) return;
            // 暂停时, 根据当前 endTimestamp 推算出精确剩余秒数
            if (endTimestamp) {
                const now = Date.now();
                let remainSec = (endTimestamp - now) / 1000;
                if (remainSec < 0) remainSec = 0;
                remainingSeconds = Math.ceil(remainSec);
                updateDisplayBySeconds(remainingSeconds);
            }
            stopTimer();  // 清除定时器并置 isRunning false
        }
        
        // ---------- 调整分钟数 (增加/减少1分钟, 联动基准时间与剩余时间) ----------
        function adjustMinutes(delta) {
            let newMinutes = initialMinutes + delta;
            if (newMinutes < 0) newMinutes = 0;
            if (newMinutes > 99) newMinutes = 99;   // 上限99分钟，保持界面清爽
            initialMinutes = newMinutes;
            const newInitialSec = initialMinutes * 60;
            
            if (!isRunning) {
                // 未运行: 直接改变剩余时间
                remainingSeconds = newInitialSec;
                updateDisplayBySeconds(remainingSeconds);
            } else {
                // 倒计时运行中: 需要动态调整结束时间戳 (保持相对调整)
                // 方法: 剩余秒数增加 delta*60 秒, 并同步更新 endTimestamp
                let newRemainingSec = remainingSeconds + (delta * 60);
                if (newRemainingSec < 0) newRemainingSec = 0;
                remainingSeconds = newRemainingSec;
                if (remainingSeconds <= 0) {
                    // 如果调整后归零，强制结束当前倒计时并触发完成/重开
                    stopTimer();
                    handleTimerComplete();
                } else {
                    // 更新结束时间戳: 当前时间 + 新剩余秒数
                    const now = Date.now();
                    endTimestamp = now + (remainingSeconds * 1000);
                    updateDisplayBySeconds(remainingSeconds);
                }
            }
        }
        
        // ---------- 音频模块 (合成 "叮咚" 提示音, 支持可调音量) ----------
        function initAudioContext() {
            if (audioCtx) return audioCtx;
            try {
                window.AudioContext = window.AudioContext || window.webkitAudioContext;
                audioCtx = new AudioContext();
                return audioCtx;
            } catch(e) {
                console.warn("Web Audio API 不支持，无法播放提示音");
                return null;
            }
        }
        
        // 播放声音 (主控音量 globalVolume)
        function playDingDong() {
            let context = audioCtx;
            if (!context) {
                context = initAudioContext();
                if (!context) return;
            }
            // 确保音频上下文激活 (浏览器用户交互后自动 resume)
            const resumeAndPlay = () => {
                if (context.state === 'suspended') {
                    context.resume().then(() => {
                        internalPlay(context);
                    }).catch(e => console.log("音频未激活, 需要用户点击界面解锁"));
                } else {
                    internalPlay(context);
                }
            };
            resumeAndPlay();
        }
        
        // 实际合成双音 "叮咚" + 柔和泛音 (三个振荡器叠加，可调主音量)
        function internalPlay(context) {
            if (!context) return;
            const now = context.currentTime;
            // 主增益 (总音量受 globalVolume 控制)
            const masterGain = context.createGain();
            masterGain.gain.value = Math.min(1.0, Math.max(0, globalVolume));
            masterGain.connect(context.destination);
            
            // 1) 叮 (高频 880Hz)
            const osc1 = context.createOscillator();
            const gain1 = context.createGain();
            osc1.type = 'sine';
            osc1.frequency.value = 880;
            gain1.gain.value = 0.85;
            osc1.connect(gain1);
            gain1.connect(masterGain);
            gain1.gain.exponentialRampToValueAtTime(0.0001, now + 0.55);
            osc1.start(now);
            osc1.stop(now + 0.28);
            
            // 2) 咚 (中低频 540Hz)
            const osc2 = context.createOscillator();
            const gain2 = context.createGain();
            osc2.type = 'sine';
            osc2.frequency.value = 540;
            gain2.gain.value = 0.6;
            osc2.connect(gain2);
            gain2.connect(masterGain);
            gain2.gain.exponentialRampToValueAtTime(0.0001, now + 0.85);
            osc2.start(now + 0.18);
            osc2.stop(now + 0.5);
            
            // 3) 高频泛音 (增加清脆感, 音量较低)
            const osc3 = context.createOscillator();
            const gain3 = context.createGain();
            osc3.type = 'triangle';
            osc3.frequency.value = 1280;
            gain3.gain.value = 0.5;
            osc3.connect(gain3);
            gain3.connect(masterGain);
            gain3.gain.exponentialRampToValueAtTime(0.0001, now + 0.4);
            osc3.start(now + 0.03);
            osc3.stop(now + 0.24);
        }
        
        // 用户交互时唤醒音频 (提升首次播放成功率)
        function unlockAudioOnInteraction() {
            const ctx = audioCtx || initAudioContext();
            if (ctx && ctx.state === 'suspended') {
                ctx.resume().catch(e => {});
            }
        }
        
        // ---------- 音量滑块绑定 ----------
        function bindVolumeControls() {
            if (volumeSlider) {
                volumeSlider.addEventListener('input', (e) => {
                    let val = parseFloat(e.target.value);
                    if (isNaN(val)) val = 0.35;
                    globalVolume = Math.min(1, Math.max(0, val));
                    if (volumeValueSpan) {
                        volumeValueSpan.innerText = Math.round(globalVolume * 100) + '%';
                    }
                    unlockAudioOnInteraction();   // 顺便尝试解锁音频
                });
                // 初始化显示
                if (volumeValueSpan) {
                    volumeValueSpan.innerText = Math.round(globalVolume * 100) + '%';
                }
            }
        }
        
        // ---------- 事件绑定与页面初始化 ----------
        function bindEvents() {
            plusBtn.addEventListener('click', () => {
                adjustMinutes(1);
                unlockAudioOnInteraction();
            });
            minusBtn.addEventListener('click', () => {
                adjustMinutes(-1);
                unlockAudioOnInteraction();
            });
            startBtn.addEventListener('click', () => {
                startTimer();
                unlockAudioOnInteraction();
            });
            pauseBtn.addEventListener('click', () => {
                pauseTimer();
                unlockAudioOnInteraction();
            });
            resetBtn.addEventListener('click', () => {
                resetTimer();
                unlockAudioOnInteraction();
            });
        }
        
        // 额外针对 body 的音频解锁 (全局友好)
        function globalAudioUnlock() {
            const events = ['click', 'touchstart'];
            events.forEach(ev => {
                document.body.addEventListener(ev, () => {
                    const ctx = audioCtx || initAudioContext();
                    if (ctx && ctx.state === 'suspended') ctx.resume();
                }, { once: false });
            });
        }
        
        // 页面初始化
        function init() {
            initialMinutes = 10;
            initialTotalSeconds = 600;
            remainingSeconds = 600;
            updateDisplayBySeconds(remainingSeconds);
            initAudioContext();
            bindEvents();
            bindVolumeControls();
            globalAudioUnlock();
            // 确保任何情况下不残留计时器
            stopTimer();
        }
        
        init();
    })();
</script>
</body>
</html>
